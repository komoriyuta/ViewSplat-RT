# @package _global_

defaults:
  - /dataset@_group_.dl3dv: dl3dv
  - override /model/encoder: spf_viewsplat
  - override /model/encoder/backbone: croco_multi
  - override /model/decoder: splatting_cuda
  - override /loss: [mse, lpips, reproj]

wandb:
  name: dl3dv
  tags: [dl3dv, 256x256]
  project: viewsplat
  

loss:
  reproj:
    weight: 0.001
    mode: "dyntanh"
    total_iterations: 400_001

model:
  encoder:
    backbone:
      name: croco_multi
      intrinsics_embed_loc: encoder
      intrinsics_embed_type: token

    pretrained_weights: './pretrained_weights/re10k_spfsplat.ckpt'


dataset:
  dl3dv:
    make_baseline_1: true
    view_sampler:
      warm_up_steps: 200_000
      num_target_views: 1
      num_context_views: 2
      max_distance_between_context_views: 10

optimizer:
  lr: 1e-4
  warm_up_steps: 2000
  backbone_lr_multiplier: 0.1
  min_lr_multiplier: 0.01

data_loader:
  train:
    batch_size: 4

trainer:
  max_steps: 400_001
  val_check_interval: 10000
  accumulate_grad_batches: 1

checkpointing:
  every_n_train_steps: 5000
  save_weights_only: false
  save_top_k: 5


train:
  training_context: false

test:
  output_path: outputs/test/viewsplat
  align_pose: false
  compute_scores: true
  save_image: true
  save_video: false
  save_compare: false
  with_offset_only: false